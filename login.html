<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LookaGenius Academy | تسجيل الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main id="app-container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 100px;">
        <div class="glass-card" style="width: 100%; max-width: 450px; padding: 40px;" data-aos="zoom-in">
            <h2 style="text-align: center; margin-bottom: 30px; font-weight: 800;">تسجيل الدخول</h2>
            <form id="loginForm">
                <div class="form-group" style="text-align: right; margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" class="form-control" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff;" required>
                </div>
                <div class="form-group" style="text-align: right; margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary);">كلمة المرور</label>
                    <input type="password" id="loginPassword" class="form-control" style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff;" required>
                </div>
                <div id="loginErrorMsg" style="color: var(--accent-pink); text-align: center; margin-bottom: 15px; font-size: 0.9rem; display: none;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; border-radius: 50px; font-size: 1.1rem;">دخول الآن <i class="fa-solid fa-sign-in-alt"></i></button>
            </form>
            <div style="text-align: center; margin-top: 25px; color: var(--text-secondary); font-size: 0.9rem;">
                ليس لديك حساب؟ <a href="register.html" style="color: var(--primary-blue); font-weight: 700;">إنشاء حساب جديد</a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/db.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/app.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            if (form) {
                form.onsubmit = (e) => {
                    e.preventDefault();
                    const email = document.getElementById('loginEmail').value;
                    const pass = document.getElementById('loginPassword').value;
                    const res = window.auth.login(email, pass);
                    if (res.success) {
                        window.location.href = `dashboard-${res.user.type}.html`;
                    } else {
                        const err = document.getElementById('loginErrorMsg');
                        err.textContent = res.message;
                        err.style.display = 'block';
                    }
                };
            }
        });
    </script>
</body>
</html>
